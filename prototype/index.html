<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patchlog — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: oklch(0.16 0.008 240); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel">
  const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSlider, TweakColor, TweakSelect } = window;
  const DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "accent": "#7fe3a1",
    "badgeStyle": "bracket",
    "density": 1,
    "initialView": "editor"
  }/*EDITMODE-END*/;

  function Root() {
    const [tw, setTweak] = useTweaks(DEFAULTS);
    const accent = tw.accent;
    const style = { "--accent": accent, "--accent-soft": accent + "24" };
    return (
      <div style={{ height: "100%", width: "100%", ...style }}>
        <window.PatchlogApp
          initialView={tw.initialView}
          badgeStyle={tw.badgeStyle}
          density={tw.density}
          theme={tw.theme}
        />
        <TweaksPanel>
          <TweakSection label="Tema" />
          <TweakRadio label="Modo" value={tw.theme}
            options={[{value:"dark",label:"Oscuro"},{value:"light",label:"Claro"}]}
            onChange={v => setTweak("theme", v)} />
          <TweakColor label="Acento" value={tw.accent} onChange={v => setTweak("accent", v)} />
          <TweakSection label="Componentes" />
          <TweakRadio label="Badges" value={tw.badgeStyle}
            options={[{value:"bracket",label:"[·]"},{value:"pill",label:"Pill"},{value:"dot",label:"Dot"}]}
            onChange={v => setTweak("badgeStyle", v)} />
          <TweakSlider label="Densidad" min={0.7} max={1.3} step={0.05} value={tw.density}
            onChange={v => setTweak("density", v)} />
          <TweakSection label="Ir a pantalla" />
          <TweakSelect label="Pantalla" value={tw.initialView}
            options={[
              {value:"landing",label:"Landing"},
              {value:"login",label:"Login"},
              {value:"dashboard",label:"Dashboard"},
              {value:"project",label:"Proyecto"},
              {value:"feed",label:"Feed"},
              {value:"public",label:"Pág. pública"},
              {value:"editor",label:"Editor"}
            ]}
            onChange={v => setTweak("initialView", v)} />
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
